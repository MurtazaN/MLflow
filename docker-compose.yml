# Docker Compose for MLflow Wine Quality Pipeline
#
# Usage:
#   docker compose up --build    (first time or after dependency changes)
#   docker compose up            (subsequent runs — uses cached image + volume-mounted code)
#   docker compose down          (stop everything)
#
# Code changes: No rebuild needed — source code is volume-mounted.
# Dependency changes: Rebuild with --build flag.

services:
  # MLflow Tracking Server (official image + SQLite backend)
  mlflow-server:
    image: ghcr.io/mlflow/mlflow:v${MLFLOW_VERSION}
    environment:
      # Allowed hosts
      MLFLOW_SERVER_ALLOWED_HOSTS: ${MLFLOW_SERVER_ALLOWED_HOSTS}
    command: >
      mlflow server
        --backend-store-uri sqlite:///app/mlflow-data/mlflow.db
        --default-artifact-root /app/mlartifacts
        --host 0.0.0.0
        --port 5000
        --allowed-hosts ${MLFLOW_SERVER_ALLOWED_HOSTS}
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/app/mlflow-data
      - ./mlartifacts:/app/mlartifacts
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  # Training Pipeline
  pipeline:
    build: .
    command: python src/run_pipeline.py
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./mlartifacts:/app/mlartifacts
      - ./logs:/app/logs
      - mlflow-data:/app/mlflow-data
    environment:
      MLFLOW_TRACKING_URI: http://mlflow-server:5000
    depends_on:
      mlflow-server:
        condition: service_healthy

  # Model Serving
  model-server:
    build: .
    command: >
      mlflow models serve -m "models:/wine_quality/production" -p 5001 --host 0.0.0.0 --env-manager=local
    ports:
      - "5001:5001"
    volumes:
      - ./mlartifacts:/app/mlartifacts
      - mlflow-data:/app/mlflow-data
    environment:
      MLFLOW_TRACKING_URI: http://mlflow-server:5000
    depends_on:
      pipeline:
        condition: service_completed_successfully

  # Real-time Inference
  inference:
    build: .
    command: >
      sh -c "sleep 10 && python src/inference.py"
    volumes:
      - ./src:/app/src
    environment:
      INFERENCE_URL: http://model-server:5001/invocations
    depends_on:
      model-server:
        condition: service_started

volumes:
  mlflow-data:
